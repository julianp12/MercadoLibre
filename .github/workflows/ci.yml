name: CI – Boston Housing API

on:
  push:
    branches: [main, trunk, "feature/**"]
  pull_request:
    branches: [main, trunk]

jobs:
  test:
    name: Tests y cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ejecutar tests
        run: |
          PYTHONPATH=src pytest tests/ -x -v --cov=src --cov-report=term-missing

  docker:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f deployment/Dockerfile -t boston-housing-api:${{ github.sha }} .

      - name: Smoke test contenedor
        run: |
          docker run -d --name api-test -p 8000:8000 boston-housing-api:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop api-test
